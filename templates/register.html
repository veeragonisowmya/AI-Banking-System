<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Register - AI Smart Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                🏦 AI Smart Bank
            </a>

            <div class="navbar-nav ms-auto">

                <a class="nav-link text-white"
                   href="/dashboard">
                    Dashboard
                </a>

                <a class="nav-link text-white"
                   href="/transfer">
                    Transfer
                </a>

                <a class="nav-link text-white"
                   href="/history">
                    History
                </a>

                <a class="nav-link text-white"
                   href="/fraud_report">
                    Fraud Report
                </a>

                <a class="nav-link text-white"
                   href="/admin_dashboard">
                    Admin
                </a>

            </div>

        </div>

    </nav>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg mt-5">

                    <div class="card-body p-5">

                        <h2 class="text-center mb-2">
                            AI Smart Bank
                        </h2>

                        <p class="text-center text-muted mb-4">
                            Create your secure banking account
                        </p>

                        <h3 class="text-center mb-4">
                            Register
                        </h3>

                        <form action="/register" method="POST" onsubmit="return validateForm()">

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
					name="fullname"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input type="email"
				       name="email"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Mobile
                                </label>

                                <input type="text"
				       name="mobile"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password"
                                       id="password"
				       name="password"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input type="password"
                                       id="confirm"
                                       class="form-control"
                                       required>

                            </div>

                            <button class="btn btn-primary w-100">
                                Register
                            </button>

                            <div class="text-center mt-3">

                                Already have an account?

                                <a href="/">
                                    Login
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Footer -->

    <footer class="text-center mt-5 p-3 bg-light">

        © 2026 AI Smart Banking System |
        MCA Minor Project

    </footer>

    <!-- Validation Script -->

    <script>

        function validateForm() {

            let password =
                document.getElementById("password").value;

            let confirm =
                document.getElementById("confirm").value;

            if (password !== confirm) {

                alert("Passwords do not match");

                return false;
            }

            return true;
        }

    </script>

</body>

</html>
