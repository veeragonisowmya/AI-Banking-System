<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Transfer Money</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.15);
        }

    </style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<div class="card-body">

<h2 class="text-center mb-4">

💸 Transfer Money

</h2>


<!-- Success Message -->

{% if success %}

<div class="alert alert-success">

<strong>Success!</strong><br>

{{ success }}

</div>

<div class="text-center mb-3">

<a href="/dashboard" class="btn btn-primary">

🏠 Dashboard

</a>

<a href="/history" class="btn btn-success">

📜 Transaction History

</a>

</div>

{% endif %}


<!-- Error Message -->

{% if error %}

<div class="alert alert-danger">

<strong>Error!</strong><br>

{{ error }}

</div>

{% endif %}


<form method="POST">

<div class="mb-3">

<label class="form-label">

From Account

</label>

<input
type="text"
class="form-control"
value="{{ user[5] }}"
readonly>

</div>


<div class="mb-3">

<label class="form-label">

Receiver Account Number

</label>

<input
type="text"
class="form-control"
name="receiver"
placeholder="Enter Receiver Account Number"
required>

</div>


<div class="mb-3">

<label class="form-label">

Amount (₹)

</label>

<input
type="number"
class="form-control"
name="amount"
step="0.01"
min="1"
placeholder="Enter Amount"
required>

</div>


<div class="mb-3">

<label class="form-label">

Device

</label>

<select
class="form-select"
name="device"
required>

<option value="Known">Known Device</option>

<option value="New">New Device</option>

</select>

</div>


<div class="mb-3">

<label class="form-label">

Location

</label>

<select
class="form-select"
name="location"
required>

<option value="Home">Home</option>

<option value="Different">Different Location</option>

</select>

</div>


<div class="mb-3">

<label class="form-label">

Transaction Time

</label>

<select
class="form-select"
name="time"
required>

<option value="Day">Day</option>

<option value="Night">Night</option>

</select>

</div>


<div class="d-grid">

<button
type="submit"
class="btn btn-primary btn-lg">

Transfer Money

</button>

</div>

</form>

<hr>

<div class="text-center">

<a href="/dashboard" class="btn btn-secondary">

⬅ Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
